name: Deploy Maher Hero to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validate Vercel deploy hook
        shell: bash
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          if [ -z "${VERCEL_DEPLOY_HOOK_URL:-}" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not configured."
            exit 1
          fi
          case "$VERCEL_DEPLOY_HOOK_URL" in
            https://api.vercel.com/v1/integrations/deploy/*) ;;
            *)
              echo "The saved secret is not a Vercel Deploy Hook URL."
              echo "Expected it to start with: https://api.vercel.com/v1/integrations/deploy/"
              exit 1
              ;;
          esac

      - name: Trigger latest main deployment
        shell: bash
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          set -euo pipefail
          response_file="$(mktemp)"
          http_code=$(curl --silent --show-error \
            --output "$response_file" \
            --write-out "%{http_code}" \
            --request POST \
            "$VERCEL_DEPLOY_HOOK_URL")

          echo "Vercel response status: $http_code"
          cat "$response_file"
          echo

          if [ "$http_code" -lt 200 ] || [ "$http_code" -ge 300 ]; then
            echo "Vercel rejected the deploy hook request."
            exit 1
          fi

          if ! grep -Eq '"job"|"id"|"url"' "$response_file"; then
            echo "The URL returned a successful HTTP response, but it does not look like a Vercel deploy-hook response."
            exit 1
          fi

          echo "Vercel accepted a deployment request for the main branch."
