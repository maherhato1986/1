name: Deploy Maher Hero to Vercel

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: vercel-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Verify deploy hook secret
        shell: bash
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not configured in GitHub Actions secrets."
            echo "Create a Vercel Deploy Hook for branch main, then save it as this repository secret."
            exit 1
          fi

      - name: Trigger Vercel production deployment
        shell: bash
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          curl --fail --show-error --silent \
            --request POST \
            "$VERCEL_DEPLOY_HOOK_URL"
          echo
          echo "Vercel deployment triggered for the latest main commit."
